# Create frontend site (serves SPA and proxies /api to backend so old builds keep working)
sudo tee /etc/nginx/sites-available/ahttak-frontend > /dev/null <<'EOF'
server {
    listen 80;
    server_name ahttak.or.ke www.ahttak.or.ke;
    client_max_body_size 100M;

    root /var/www/ahtak/frontend/dist;
    index index.html;

    location /static/ {
        alias /var/www/ahtak/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /var/www/ahtak/media/;
    }

    # Proxy API calls to backend gunicorn (keeps SPA calling /api/ on same origin working)
    location /api/ {
        include proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/run/gunicorn-ahtak.sock;
        proxy_read_timeout 300;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
EOF

# Create API site (api.ahttak.or.ke)
sudo tee /etc/nginx/sites-available/ahttak-api > /dev/null <<'EOF'
server {
    listen 80;
    server_name api.ahttak.or.ke;
    client_max_body_size 100M;

    location /static/ {
        alias /var/www/ahtak/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /var/www/ahtak/media/;
    }

    location / {
        include proxy_params;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/run/gunicorn-ahtak.sock;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
EOF

# Enable both (create expected symlinks)
sudo ln -sf /etc/nginx/sites-available/ahttak-frontend /etc/nginx/sites-enabled/ahttak-frontend
sudo ln -sf /etc/nginx/sites-available/ahttak-api /etc/nginx/sites-enabled/ahttak-api

# Test and reload nginx
sudo nginx -t
sudo systemctl reload nginx